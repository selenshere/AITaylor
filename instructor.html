<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Instructor Panel</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="topbar">
    <div class="brand">Instructor Panel</div>
    <div class="right">
      <button onclick="loadData()" class="btn secondary">Refresh</button>
      <button onclick="exportCSV()" class="primaryBtn">Export CSV</button>
      <button onclick="createClass()">Create Class</button>
    </div>
  </header>

  <main class="page">
    <section class="card">
      <h2>All Submissions</h2>
      <div id="list"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script type="module" src="instructor.js"></script>
</body>
</html>
