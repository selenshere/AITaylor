<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Instructor Panel</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="topbar">
    <div class="brand">Instructor Panel</div>
  </header>

  <main class="page">

    <!-- PAGE 1 -->
    <section id="pageStart" class="card">
      <h2 style="text-align:center;">Welcome</h2>

      <div class="row" style="justify-content:center;">
        <button onclick="showCreate()" class="btn secondary">Create Class</button>
        <button onclick="showLogin()" class="btn secondary">Login to Class</button>
      </div>
    </section>

    <!-- PAGE 2 CREATE -->
    <section id="pageCreate" class="card hidden">
      <h2>Create Class</h2>

      <label class="q">
        <span>Class Name</span>
        <input id="className" type="text" placeholder="Write class name..." />
      </label>

      <label class="q">
        <span>Password</span>
        <input id="classPassword" type="text" placeholder="Write password..." />
      </label>

      <div class="row">
        <button onclick="createClass()" class="primaryBtn">Create</button>
        <button onclick="showLogin()" class="btn secondary">Go to Login</button>
      </div>

      <!-- RESULT -->
      <div id="classResult" class="ok" style="margin-top:10px;"></div>
      
      <div id="copyBox" class="row hidden" style="margin-top:8px;">
      </div>
    </section>

    <!-- PAGE 3 LOGIN -->
    <section id="pageLogin" class="card hidden">
      <h2>Login to Class</h2>

      <label class="q">
        <span>Class Code</span>
        <input id="loginCode" type="text" placeholder="Enter class code..." />
      </label>

      <label class="q">
        <span>Password</span>
        <input id="loginPassword" type="text" placeholder="Enter password..." />
      </label>

      <div class="row">
        <button onclick="loginClass()" class="primaryBtn">Login</button>
        <button onclick="showCreate()" class="btn secondary">Create a Class</button>
      </div>
    </section>

    <!-- DASHBOARD -->
    <section id="pageDashboard" class="card hidden">
      <h2>Dashboard</h2>

      <!-- CLASS INFO -->
      <div id="classInfo" style="margin-bottom:10px; font-weight:500;"></div>

      <div class="row">
        <button onclick="loadData()" class="btn secondary">Refresh</button>
        <button onclick="exportCSV()" class="primaryBtn">Export CSV</button>
      </div>

      <div id="list"></div>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="instructor.js"></script>
</body>
</html>
