
<!DOCTYPE html>
<html>
<body>
<h2>Teacher Dashboard</h2>
<input id="classId" placeholder="Class code">
<button onclick="load()">Load</button>
<button onclick="download()">Export</button>
<div id="stats"></div>
<div id="list"></div>
<script>
let DATA=[];
async function load(){
 const classId=document.getElementById("classId").value;
 const res=await fetch(`/api/teacher?classId=${classId}`);
 DATA=await res.json();
 const working=DATA.filter(s=>s.status==="working").length;
 const done=DATA.filter(s=>s.status==="done").length;
 document.getElementById("stats").innerHTML=
  "Students:"+DATA.length+" | Working:"+working+" | Done:"+done;
 document.getElementById("list").innerHTML=
  DATA.map(s=>`<div><b>${s.student_name}</b> - ${s.status}
  <details><pre>${JSON.stringify(s.messages,null,2)}</pre></details></div>`).join("");
}
function download(){
 const blob=new Blob([JSON.stringify(DATA,null,2)]);
 const a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="data.json";
 a.click();
}
</script>
</body>
</html>
