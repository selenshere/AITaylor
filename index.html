<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Taylor System</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="data:,">
</head>
<body>

<div id="entry" class="card center">
  <h2>Enter</h2>
  <div class="row">
    <button onclick="chooseRole('educator')">Educator</button>
    <button onclick="chooseRole('student')">Student</button>
  </div>
</div>

<div id="auth" class="card hidden"></div>

<div id="modal" class="modal hidden">
  <div class="modalContent">
    <span class="close" onclick="closeModal()">✖</span>
    <h3>Class Created ✅</h3>
    <p id="classCodeText"></p>
    <input id="copyLink" readonly>
    <div class="row">
      <button onclick="copyLink()">Copy Link</button>
      <button onclick="goDashboard()">Go to Dashboard</button>
    </div>
  </div>
</div>

<div id="app" class="hidden">
<header class="topbar">
  <div class="brand">Taylor Task</div>
  <button id="submitBtn">Finish & Submit</button>
</header>

<div id="dashboard" class="card hidden">
  <h3>Student Submissions</h3>
  <div id="studentList"></div>
</div>

<main id="pageWelcome" class="page hidden">
  <div class="card">
    <input id="firstName" placeholder="First name">
    <textarea id="q3" placeholder="First message"></textarea>
    <button id="startBtn">Start Chat</button>
  </div>
</main>

<main id="pageChat" class="page hidden">
  <div class="layout">
    <div class="card chat">
      <div id="chatLog"></div>
      <textarea id="userInput"></textarea>
      <button id="sendBtn">Send</button>
    </div>
  </div>
</main>
</div>

<script src="app.js"></script>
</body>
</html>
