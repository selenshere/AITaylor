<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Taylor Task</title>
<link rel="stylesheet" href="style.css" />
</head>

<body>

<header class="topbar">
  <div class="brand">Taylor Task</div>
  <button id="submitBtn">Finish & Submit</button>
</header>

<!-- PAGE 1 -->
<main id="pageWelcome" class="page">
  <div class="card">
    <h2>Before you start</h2>

    <input id="firstName" placeholder="First name">
    <input id="lastName" placeholder="Last name">

    <textarea id="q3" placeholder="First message"></textarea>

    <button id="startBtn">Start Chat</button>
  </div>

  <div class="card">
    <img src="images/task.png" style="width:100%">
  </div>
</main>

<!-- PAGE 2 -->
<main id="pageChat" class="page hidden">
  <div class="layout">

    <!-- LEFT -->
    <div class="card">
      <img src="images/task.png" style="width:100%">
    </div>

    <!-- RIGHT -->
    <div class="card chat">
      <div id="chatLog"></div>
      <textarea id="userInput"></textarea>
      <button id="sendBtn">Send</button>
    </div>

  </div>
</main>

<script src="app.js"></script>
</body>
</html>
