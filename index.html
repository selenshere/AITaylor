<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>Taylor Task</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<header class="topbar">
  <div>Taylor Task</div>
  <button id="submitBtn">Finish & Submit</button>
</header>

<main id="pageWelcome">
  <input id="firstName" placeholder="First name"/>
  <input id="lastName" placeholder="Last name"/>
  <textarea id="q3" placeholder="First message"></textarea>
  <button id="startBtn">Start Chat</button>
</main>

<main id="pageChat" class="hidden">
  <div class="layout">
    <div class="card"><img src="images/task.png" style="width:100%"/></div>
    <div class="card">
      <div id="chatLog"></div>
      <textarea id="userInput"></textarea>
      <button id="sendBtn">Send</button>
    </div>
  </div>
</main>

<script src="app.js"></script>
</body>
</html>
