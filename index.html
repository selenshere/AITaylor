<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Taylor Task</title>
<link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- ROLE -->

<div id="roleScreen" class="centerBox">
  <h2>Enter</h2>
  <button onclick="enterRole('student')">Student</button>
  <button onclick="enterRole('educator')">Educator</button>
</div>

<!-- ================= STUDENT ================= -->

<div id="studentApp" class="hidden">

<header class="topbar">
  <div>Taylor Task</div>
  <button id="submitBtn">Finish & Submit</button>
</header>

<!-- ===== FIRST PAGE ===== -->

<main id="page1" class="page">

  <div class="grid">

```
<!-- LEFT -->
<div class="card">
  <h3>Task</h3>
  <img src="images/task.png" />
</div>

<!-- RIGHT -->
<div class="card">

  <input id="studentName" placeholder="First name" />
  <input id="classCode" placeholder="Class code" />

  <textarea id="q1" placeholder="What do you want to understand?"></textarea>
  <textarea id="q3" placeholder="First message"></textarea>

  <button id="startBtn">Start Chat</button>

</div>
```

  </div>

</main>

<!-- ===== SECOND PAGE ===== -->

<main id="page2" class="page hidden">

  <div class="grid">

```
<!-- LEFT ANALYSIS -->
<div class="card">
  <h3>Analysis</h3>

  <div id="selectedText"></div>

  <textarea id="reasoning" placeholder="Reasoning"></textarea>
  <textarea id="nextIntent" placeholder="Next step"></textarea>

  <button id="saveReturnBtn">Continue</button>
</div>

<!-- RIGHT CHAT -->
<div class="card">

  <h3>Chat with Taylor</h3>

  <div id="chatLog"></div>

  <textarea id="userInput"></textarea>
  <button id="sendBtn">Send</button>

</div>
```

  </div>

</main>

</div>

<!-- ================= EDUCATOR ================= -->

<div id="educatorApp" class="hidden centerBox">
  <h2>Educator</h2>

  <input id="classInput" placeholder="Class code"/>
  <button onclick="loadClass()">Load</button>

  <div id="studentsList"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="app.js"></script>

</body>
</html>
