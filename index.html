<input id="email" placeholder="email" />
<input id="password" type="password" />

<button onclick="login()">Login</button>
<button onclick="signup()">Sign up</button>

<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>Taylor Task</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<header class="topbar">
  <div>Taylor Task</div>
  <button id="submitBtn">Finish & Submit</button>
</header>

<main id="pageWelcome">
  <h2>Before you start</h2>
  <input id="firstName" placeholder="First name"/>
  <input id="lastName" placeholder="Last name"/>
  <textarea id="q3" placeholder="First message"></textarea>
  <button id="startBtn">Start Chat</button>
</main>

<main id="pageChat" class="hidden">
  <div class="layout">
    <div class="card">
      <h3>Task</h3>
      <p>1/4 + 1/6 problem</p>
    </div>

    <div class="card">
      <div id="chatLog"></div>
      <textarea id="userInput"></textarea>
      <button id="sendBtn">Send</button>
    </div>
  </div>
</main>

<div id="analysisBox" class="hidden">
  <h3>Analysis</h3>
  <textarea id="analysisInput" placeholder="Your analysis"></textarea>
  <button id="saveAnalysis">Save</button>
</div>

<script src="app.js"></script>
</body>
</html>
