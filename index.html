<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Taylor System</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="entry" class="card">
  <h2>Enter</h2>
  <button onclick="chooseRole('educator')">Educator</button>
  <button onclick="chooseRole('student')">Student</button>
</div>

<div id="auth" class="card"></div>

<div id="app" style="display:none">

  <div id="info"></div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="card" style="display:none">
    <h3>Students</h3>
    <div id="studentList"></div>
  </div>

  <!-- CHAT -->
  <div id="chatSection" class="card">
    <div id="chatLog"></div>

    <textarea id="userInput"></textarea>
    <button onclick="sendMessage()">Send</button>

    <button onclick="submitChat()">Finish & Submit</button>
  </div>

</div>

<script src="app.js?v=2"></script>
</body>
</html>
